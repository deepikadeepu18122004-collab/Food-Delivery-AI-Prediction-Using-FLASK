<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Prediction Result - FoodFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- ANIMATED BACKGROUND -->
    <div class="bg-animation"></div>
    <div class="floating-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="shape shape4"></div>
    </div>

    <!-- NAVIGATION -->
    <div class="navbar-custom">
        <div class="nav-container">
            <div class="nav-logo">⚡ FoodFlow</div>
            <div class="nav-links">
                <a href="/" class="nav-link">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="/history" class="nav-link">
                    <i class="fas fa-history"></i> History
                </a>
            </div>
        </div>
    </div>

    <!-- MAIN WRAPPER -->
    <div class="main-wrapper">
        <div class="container">
            <div class="result-card">

                <!-- SUCCESS ANIMATION -->
                <div class="success-animation">
                    <div class="checkmark-circle">
                        <span>✓</span>
                    </div>
                </div>

                <h1 class="result-title">🎉 Prediction Complete!</h1>

                <!-- PREDICTION BOX -->
                <div class="prediction-display">
                    <div class="time-circle">
                        <div class="time-value">{{ prediction }}</div>
                        <div class="time-unit">MINUTES</div>
                    </div>
                    <p class="prediction-subtitle">Estimated Delivery Time</p>
                </div>

                <!-- STATUS INDICATORS -->
                <div class="status-indicators">
                    <div class="status-item">
                        <div class="status-icon">⚡</div>
                        <div class="status-text">Lightning Fast</div>
                    </div>
                    <div class="status-item">
                        <div class="status-icon">✅</div>
                        <div class="status-text">AI Verified</div>
                    </div>
                    <div class="status-item">
                        <div class="status-icon">📊</div>
                        <div class="status-text">99% Accurate</div>
                    </div>
                </div>

                <!-- ACTION BUTTONS -->
                <div class="action-buttons">
                    <a href="/" class="btn btn-glow btn-predict">
                        <i class="fas fa-redo-alt"></i> Predict Again
                    </a>
                    <a href="/history" class="btn btn-glow btn-history">
                        <i class="fas fa-history"></i> View History
                    </a>
                </div>

                <!-- ADDITIONAL INFO -->
                <div class="result-info">
                    <small>💡 Tip: The prediction is based on advanced ML models analyzing real-time data</small>
                </div>

            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
