<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Food Delivery AI Predictor - Advanced</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- ANIMATED BACKGROUND -->
    <div class="bg-animation"></div>
    <div class="floating-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="shape shape4"></div>
    </div>

    <!-- NAVIGATION -->
    <div class="navbar-custom">
        <div class="nav-container">
            <div class="nav-logo">⚡ FoodFlow</div>
            <div class="nav-links">
                <a href="/" class="nav-link active">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="/history" class="nav-link">
                    <i class="fas fa-history"></i> History
                </a>
            </div>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="main-wrapper">
        <div class="container">
            <div class="main-card">
                
                <!-- HEADER SECTION -->
                <div class="header-section">
                    <h1 class="title-main">🍕 Food Delivery Time Predictor</h1>
                    <p class="subtitle-main">⚡ AI-Powered | Super Fast | Ultra Accurate</p>
                    <div class="title-underline"></div>
                </div>

                <!-- FORM SECTION -->
                <form action="/predict" method="POST" class="prediction-form">

                    <!-- ROW 1: PERSON DETAILS -->
                    <div class="form-section">
                        <h5 class="section-title">👤 Delivery Partner Details</h5>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="input-group-custom">
                                    <label class="input-label">📅 Age (years)</label>
                                    <input type="number" name="age" placeholder="Enter age" class="form-input" required>
                                    <div class="input-icon">👤</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group-custom">
                                    <label class="input-label">⭐ Ratings (1-5)</label>
                                    <input type="number" step="0.1" name="ratings" placeholder="Enter rating" class="form-input" required>
                                    <div class="input-icon">⭐</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ROW 2: ORDER DETAILS -->
                    <div class="form-section">
                        <h5 class="section-title">🗺️ Route & Time Information</h5>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="input-group-custom">
                                    <label class="input-label">📍 Distance (KM)</label>
                                    <input type="number" step="0.1" name="distance" placeholder="Enter distance" class="form-input" required>
                                    <div class="input-icon">📍</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group-custom">
                                    <label class="input-label">⏱️ Preparation Time (min)</label>
                                    <input type="number" name="preparation_time" placeholder="Enter prep time" class="form-input" required>
                                    <div class="input-icon">⏱️</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ROW 3: CONDITIONS -->
                    <div class="form-section">
                        <h5 class="section-title">🌍 External Conditions</h5>
                        <div class="row">
                            <div class="col-md-4">
                                <div class="input-group-custom">
                                    <label class="input-label">☀️ Weather</label>
                                    <select name="weather" class="form-select" required>
                                        <option value="">Select Weather</option>
                                        <option value="Sunny">☀️ Sunny</option>
                                        <option value="Cloudy">☁️ Cloudy</option>
                                        <option value="Rainy">🌧️ Rainy</option>
                                        <option value="Foggy">🌫️ Foggy</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="input-group-custom">
                                    <label class="input-label">🚗 Traffic</label>
                                    <select name="traffic" class="form-select" required>
                                        <option value="">Select Traffic</option>
                                        <option value="Low">🟢 Low</option>
                                        <option value="Medium">🟡 Medium</option>
                                        <option value="High">🔴 High</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="input-group-custom">
                                    <label class="input-label">🚗 Vehicle</label>
                                    <select name="vehicle" class="form-select" required>
                                        <option value="">Select Vehicle</option>
                                        <option value="Bike">🏍️ Bike</option>
                                        <option value="Scooter">🛵 Scooter</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- SUBMIT BUTTON -->
                    <button type="submit" class="glow-btn btn-primary">
                        <span class="btn-text">🚀 PREDICT NOW</span>
                        <span class="btn-loader"></span>
                    </button>

                </form>

            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
